name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pydantic-settings
          pip install google-generativeai

      - name: Verify package imports
        run: |
          python -c "
          import os
          os.environ['GROQ_API_KEY'] = 'dummy'
          os.environ['GEMINI_API_KEY'] = 'dummy'
          os.environ['NVIDIA_API_KEY'] = 'dummy'
          os.environ['CONTEXTLENS_DEFAULT_PROVIDER'] = 'groq'
          os.environ['CONTEXTLENS_LOG_DIR'] = '/tmp/logs'
          from contextlens.core.logger import ContextLogger, ContextEntry, RetrievedDoc
          from contextlens.core.evaluator import ContextEvaluator
          from contextlens.core.monitor import TokenMonitor
          from contextlens.core.optimizer import ContextOptimizer
          from contextlens.providers.base import ModelResponse, ProviderError
          from contextlens.providers import PROVIDER_REGISTRY
          print('All imports OK')
          print('Providers:', list(PROVIDER_REGISTRY.keys()))
          "

      - name: Run tests with full output
        run: |
          pytest tests/test_logger.py \
                 tests/test_evaluator.py \
                 tests/test_monitor.py \
                 tests/test_optimizer.py \
                 tests/test_models.py \
                 -v --tb=long -s 2>&1
        env:
          GROQ_API_KEY: dummy-key
          GEMINI_API_KEY: dummy-key
          NVIDIA_API_KEY: dummy-key
          CONTEXTLENS_DEFAULT_PROVIDER: groq
          CONTEXTLENS_LOG_DIR: /tmp/contextlens_logs
        continue-on-error: true    # ← shows full output even on failure

      - name: Show which tests failed
        run: |
          pytest tests/test_logger.py \
                 tests/test_evaluator.py \
                 tests/test_monitor.py \
                 tests/test_optimizer.py \
                 tests/test_models.py \
                 --tb=line -q 2>&1
        env:
          GROQ_API_KEY: dummy-key
          GEMINI_API_KEY: dummy-key
          NVIDIA_API_KEY: dummy-key
          CONTEXTLENS_DEFAULT_PROVIDER: groq
          CONTEXTLENS_LOG_DIR: /tmp/contextlens_logs
          
