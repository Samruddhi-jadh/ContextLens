name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false        # ← this stops 3.10 and 3.12 cancelling when 3.11 fails
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pydantic-settings

      - name: Lint (ruff)
        run: ruff check contextlens/ --ignore E501,E402
        continue-on-error: true   # lint warnings don't block CI

      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_cli.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CONTEXTLENS_DEFAULT_PROVIDER: groq
          CONTEXTLENS_LOG_DIR: /tmp/contextlens_logs
